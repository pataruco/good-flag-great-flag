<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz | Good Flag Great Flag</title>
    <link
      rel="shortcut icon"
      type="image/png"
      href="/good-flag-great-flag/favicon.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles/main.css" />
    <script type="module" src="/src/scripts/components/site-header.ts"></script>
    <script type="module" src="/src/scripts/quiz.ts"></script>
  </head>
  <body>
    <site-header></site-header>
    <main id="main-content" class="quiz-feature clearfix">
      <section id="render-flag" class="render-flag" aria-labelledby="flag-name">
        <p id="quiz-loading" class="quiz-loading" role="status">
          Loading flags...
        </p>
        <button
          id="where"
          class="where-button"
          style="display: none"
          type="button"
        >
          Where is this country?
        </button>
        <h1 id="flag-name"></h1>
        <img id="flag-img" src="" alt="" style="display: none" />
        <div class="quiz-btns" style="display: none" id="quiz-btns">
          <button class="quiz-btn" id="bad-flag" type="button">
            Bad Flag ✘
          </button>
          <button class="quiz-btn" id="good-flag" type="button">
            Good Flag ✔
          </button>
        </div>
        <div class="render-where clearfix" id="render-where" popover="manual">
          <button
            class="close-map"
            aria-label="Close map"
            type="button"
            popovertarget="render-where"
            popovertargetaction="hide"
          >
            X
          </button>
          <iframe
            src=""
            width="100%"
            height="100%"
            style="border: 0"
            allowfullscreen
            title="Map location"
            class="where"
            id="iframe-where"
          ></iframe>
        </div>
        <div class="render-answer" aria-live="polite">
          <p id="render-answer"></p>
        </div>
        <div id="render-score" class="render-score">
          <p>Score <span id="score"></span> / <span id="tries"></span></p>
        </div>
      </section>
    </main>
  </body>
</html>
